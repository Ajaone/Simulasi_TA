{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<p class="eyebrow">New account</p>
<h2>Create your account.</h2>
<p class="muted">After signing up you'll be redirected to log in.</p>

<form id="sign-up-form">
  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="off" />
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="At least 7 characters" autocomplete="off" />
  </div>
  <button type="submit" id="sign-up-button">Create account</button>
</form>

<p class="muted" style="margin-top: 40px; font-size: 14px;">
  Already have an account? <a href="/login">Sign in</a>.
</p>
{% endblock %}
